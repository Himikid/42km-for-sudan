<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Berlin Marathon Fundraising</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              deepGreen: '#0F3D2E',
              gold: '#D4AF37',
              cream: '#F8F5EF',
              dark: '#1F1F1F'
            },
            fontFamily: {
              heading: ['"Playfair Display"', 'serif'],
              body: ['Inter', 'sans-serif']
            }
          }
        }
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-cream font-body text-dark antialiased">
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <header class="mb-6 rounded-2xl border border-deepGreen/10 bg-white p-5 shadow-sm sm:p-6">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div>
            <h1 class="font-heading text-3xl text-deepGreen sm:text-4xl">Admin Portal</h1>
            <p class="mt-2 text-sm text-dark/70 sm:text-base">Verify donations, confirm amounts, and reset pending KMs to history.</p>
          </div>
          <a href="/index.html" class="rounded-full border border-deepGreen/20 px-4 py-2 text-sm font-semibold text-deepGreen transition hover:bg-deepGreen/5">Public Site</a>
        </div>
      </header>

      <section class="mb-6 rounded-2xl border border-deepGreen/10 bg-white p-5 shadow-sm sm:p-6">
        <div class="grid gap-4 sm:grid-cols-[1fr_auto_auto] sm:items-end">
          <div>
            <label for="adminToken" class="text-sm font-semibold text-deepGreen/80">Admin Token</label>
            <input id="adminToken" type="password" class="mt-1.5 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm outline-none transition focus:border-deepGreen focus:ring-2 focus:ring-deepGreen/10" placeholder="Enter ADMIN_TOKEN" />
          </div>
          <button id="loadBtn" type="button" class="rounded-full bg-deepGreen px-5 py-2.5 text-sm font-semibold text-cream transition hover:bg-[#0b3024]">Load Data</button>
          <button id="refreshBtn" type="button" class="rounded-full border border-deepGreen/20 px-5 py-2.5 text-sm font-semibold text-deepGreen transition hover:bg-deepGreen/5">Refresh</button>
        </div>
        <p id="adminError" class="mt-3 hidden rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700"></p>
      </section>

      <section class="mb-4 flex items-center justify-between">
        <h2 class="font-heading text-2xl text-deepGreen">Kilometre Management</h2>
        <span id="summaryText" class="rounded-full bg-white px-4 py-1.5 text-xs font-semibold uppercase tracking-wide text-deepGreen/80">No data loaded</span>
      </section>

      <section id="adminGrid" class="grid grid-cols-1 gap-4 lg:grid-cols-2"></section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
